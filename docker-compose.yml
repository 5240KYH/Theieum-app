services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: approval
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval -d approval"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: approval
      DB_USERNAME: approval
      DB_PASSWORD: approval
      FILE_STORAGE_ROOT: /app/uploads
      JWT_SECRET: theieum-compose-local-jwt-secret-change-before-deploy-2026
    ports:
      - "8080:8080"
    volumes:
      - upload-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: approval_test
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval -d approval_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  upload-data:
