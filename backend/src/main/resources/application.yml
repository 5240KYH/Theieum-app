spring:
  application:
    name: receipt-approval
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:approval}
    username: ${DB_USERNAME:approval}
    password: ${DB_PASSWORD:approval}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  file-storage:
    root-path: ${FILE_STORAGE_ROOT:./data/uploads}
  attachments:
    max-image-bytes: ${ATTACHMENT_MAX_IMAGE_BYTES:5242880}
    max-files-per-application: ${ATTACHMENT_MAX_FILES_PER_APPLICATION:10}
  security:
    jwt-secret: ${JWT_SECRET}
